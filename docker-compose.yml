version: "3.8"

services:
  chatbot:
    build: .
    container_name: kakao-chatbot
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # DB 파일 영속화
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
